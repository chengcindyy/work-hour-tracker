<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="工時登記" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="為按摩師和兼職工作者設計的工時登記和統計系統" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=__ICON_VERSION__" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png?v=__ICON_VERSION__" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=__ICON_VERSION__" />
    <title>工時登記系統</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 註冊 Service Worker 並主動檢查更新
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Service Worker 已註冊:', registration);
              registration.update();
            })
            .catch((error) => {
              console.log('Service Worker 註冊失敗:', error);
            });
        });
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            navigator.serviceWorker.getRegistration().then((reg) => reg?.update());
          }
        });
      }
    </script>
  </body>

</html>
