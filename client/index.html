<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="工時登記" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="為按摩師和兼職工作者設計的工時登記和統計系統" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234f46e5' width='100' height='100'/><text x='50' y='50' font-size='50' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='system-ui'>⏱</text></svg>" />
    <title>按摩工時登記系統</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 註冊 Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Service Worker 已註冊:', registration);
            })
            .catch((error) => {
              console.log('Service Worker 註冊失敗:', error);
            });
        });
      }
    </script>
  </body>

</html>
